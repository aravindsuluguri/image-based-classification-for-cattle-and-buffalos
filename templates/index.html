<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BreedLens Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__INITIAL_STATE__ = {
        error: {{ (error or '')|tojson }},
        prediction: {{ prediction|tojson }},
        image_source: {{ (image_source or '')|tojson }}
      };
    </script>
    <script type="module" src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
